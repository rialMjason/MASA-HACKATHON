<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Southeast Asia Risk Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .map-container {
            flex: 2;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .info-panel {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-bottom: 3px solid #764ba2;
        }

        .panel-header h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .country-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .back-button.hidden {
            display: none;
        }

        .panel-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }

        .placeholder-text {
            color: #999;
            text-align: center;
            padding: 40px 20px;
            font-size: 16px;
        }

        .country-description {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #333;
        }

        .risk-metrics {
            display: grid;
            gap: 15px;
        }

        .risk-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #667eea;
        }

        .risk-card.physical {
            border-left-color: #FF6B6B;
        }

        .risk-card.transition {
            border-left-color: #FFA500;
        }

        .risk-card.liability {
            border-left-color: #4ECDC4;
        }

        .risk-label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .risk-value {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .risk-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .risk-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .risk-bar-fill.high {
            background: #FF6B6B;
        }

        .risk-bar-fill.medium {
            background: #FFA500;
        }

        .risk-bar-fill.low {
            background: #4ECDC4;
        }

        .states-section {
            margin-top: 25px;
        }

        .states-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }

        .state-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .state-badge {
            background: #e9ecef;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .zoom-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 400;
            display: none;
        }

        .zoom-info.show {
            display: block;
        }

        /* Water effect animations */
        .leaflet-container {
            background: linear-gradient(180deg, #4a90e2 0%, #357abd 50%, #1f4f89 100%);
            position: relative;
        }

        .leaflet-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, 
                    rgba(255, 255, 255, 0.1) 0%, 
                    transparent 50%, 
                    rgba(255, 255, 255, 0.1) 100%);
            z-index: 1;
            pointer-events: none;
            animation: waterGlimmer 3s ease-in-out infinite;
        }

        @keyframes waterGlimmer {
            0%, 100% {
                opacity: 0.1;
            }
            50% {
                opacity: 0.3;
            }
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .map-container {
                min-height: 500px;
                flex: none;
            }

            .info-panel {
                max-height: 400px;
                flex: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="map-container">
            <div id="map"></div>
            <div class="zoom-info">🎯 Click on any flag ball to zoom into that country</div>
        </div>

        <div class="info-panel">
            <div class="panel-header">
                <div class="country-name" id="countryName">Southeast Asia Dashboard</div>
                <p style="font-size: 14px; opacity: 0.9; margin-bottom: 10px;">Click on a flag to view details</p>
                <button class="back-button hidden" id="backButton">← Back to Map</button>
            </div>

            <div class="panel-content">
                <div class="placeholder-text" id="placeholderText">
                    Select a country from the map to view detailed information about physical risk, transition risk, and liability risk.
                </div>

                <div id="countryDetails" style="display: none;">
                    <div class="country-description" id="countryDescription"></div>

                    <div class="risk-metrics">
                        <div class="risk-card physical">
                            <div class="risk-label">Physical Risk</div>
                            <div class="risk-value" id="physicalRisk">--</div>
                            <div class="risk-bar">
                                <div class="risk-bar-fill high" id="physicalBar" style="width: 0%;"></div>
                            </div>
                        </div>

                        <div class="risk-card transition">
                            <div class="risk-label">Transition Risk</div>
                            <div class="risk-value" id="transitionRisk">--</div>
                            <div class="risk-bar">
                                <div class="risk-bar-fill medium" id="transitionBar" style="width: 0%;"></div>
                            </div>
                        </div>

                        <div class="risk-card liability">
                            <div class="risk-label">Liability Risk</div>
                            <div class="risk-value" id="liabilityRisk">--</div>
                            <div class="risk-bar">
                                <div class="risk-bar-fill" id="liabilityBar" style="width: 0%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="states-section">
                        <h3>States/Provinces</h3>
                        <div class="state-list" id="statesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="map-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
